services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: daycare-postgres
    environment:
      POSTGRES_DB: daycare_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - daycare_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daycare_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Redis (session cache, queues, rate limiting)
  redis:
    image: redis:7-alpine
    container_name: daycare-redis
    ports:
      - "6379:6379"
    volumes:
      - daycare_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # MinIO (S3-compatible object storage for documents/photos)
  minio:
    image: minio/minio:latest
    container_name: daycare-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - daycare_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Create default MinIO bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: daycare-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/daycare-platform-uploads --ignore-existing;
      mc anonymous set download local/daycare-platform-uploads;
      echo 'Bucket ready';
      "

volumes:
  daycare_postgres_data:
  daycare_redis_data:
  daycare_minio_data:
